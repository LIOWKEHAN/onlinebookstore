version: "3.9"

services:
  db:
    image: mysql:5.7
    container_name: onlinebookstore-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onlinebookstore
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  app:
    build: .
    container_name: onlinebookstore-app
    depends_on:
      - db
    ports:
      - "8083:8083"

volumes:
  mysql_data: